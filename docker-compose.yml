services:
  app:
    build: .
    ports:
      - "3000:3000"
    env_file: .env.docker
    volumes:
      - ./Development_data:/app/Development_data
      - ./public/assets/gacha:/app/public/assets/gacha
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16
    env_file: .env.docker
    ports:
      - "5432:5432"
    volumes:
      - ./Development_data/docker-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
